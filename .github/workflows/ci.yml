name: Continuous Integration

on:
  push:
    branches:
      - main
      - develop
      - 'feature/*'
      - 'ci/*'
  pull_request:
    branches:
      - main
      - develop
      - 'ci/*'
      - 'feature/*'

jobs:
  check-branch-rules:
    name: Validar Origem do Pull Request para Main
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    steps:
      - name: Validar branch de origem
        run: |
          echo "Branch destino (base): ${{ github.base_ref }}"
          echo "Branch origem (head): ${{ github.head_ref }}"
          if [ "${{ github.head_ref }}" != "develop" ]; then
            echo "ERRO: Pull Requests direcionados à 'main' devem obrigatoriamente ter origem na branch 'develop'."
            exit 1
          fi
          echo "Sucesso: PR originado de 'develop'."

  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./planeja_ai/backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Check code formatting with Black
        run: black --check src/

      - name: Check imports organization with isort
        run: isort --check-only src/

      - name: Lint with flake8
        run: flake8 src/

      - name: Run Backend Tests
        run: |
          pytest --cov=src --cov-report=xml:coverage.xml

      - name: Upload Backend Coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: planeja_ai/backend/coverage.xml

  frontend:
    name: Frontend (Flutter)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./planeja_ai

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version-filter: "^3.0.0"

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Format code
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze code
        run: |
          touch .env
          flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run Flutter Tests
        run: |
          if [ -d "test" ]; then
            flutter test --coverage
          else
            echo "No test directory found."
          fi

      - name: Upload Frontend Coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: planeja_ai/coverage/lcov.info

  sonarcloud:
    name: SonarCloud / SonarQube Analysis
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Backend Coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: planeja_ai/backend

      - name: Download Frontend Coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: planeja_ai/coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.python.coverage.reportPaths=planeja_ai/backend/coverage.xml
            -Dsonar.dart.lcov.reportPath=planeja_ai/coverage/lcov.info
