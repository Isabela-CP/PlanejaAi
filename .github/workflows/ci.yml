name: Continuous Integration

on:
  push:
    branches:
      - 'feature/*'
      - 'ci/*'
  pull_request:
    branches:
      - develop
      - 'ci/*'
      - 'feature/*'

jobs:
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./planeja_ai/backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Check code formatting with Black
        run: black --check src/

      - name: Check imports organization with isort
        run: isort --check-only src/

      - name: Lint with flake8
        run: flake8 src/

      - name: Run Backend Tests
        run: |
          # Se houver testes, o comando seria algo como `pytest`
          echo "No automated tests implemented yet for backend."

  frontend:
    name: Frontend (Flutter)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./planeja_ai

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version-filter: "^3.0.0"

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Format code
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze code
        run: |
          touch .env
          flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run Flutter Tests
        run: |
          if [ -d "test" ]; then
            flutter test
          else
            echo "No test directory found."
          fi
